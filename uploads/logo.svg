  <!-- Aesthetics italic -->
  <text x="152" y="34"
        font-family="'Playfair Display', Georgia, serif"
        font-size="22"
        font-weight="400"
        font-style="italic"
        fill="#7B9B8F">Aesthetics</text>

  <!-- Tagline -->
  <text x="82" y="48"
        font-family="'Inter', system-ui, sans-serif"
        font-size="8"
        font-weight="600"
